<pre><b><p class ="Aufgabe">Aufgabe 35

Berechnen Sie die Masse m eines Zylinders 
mit d = 1,4 m, h = 8,6 m und ρ = 2,4 t/m<sup>3</sup>.  

ρ = 2,4 t/m<sup>3</sup> = 2,4 kg/dm<sup>3</sup> 

d = 1,4 m = 14 dm  r = d/2 = 14 dm/2 = 7 dm  

h = 8,6 m = 86 dm 

m = п * r<sup>2</sup> * h * ρ 

m = п * 7<sup>2</sup> dm<sup>2</sup> * 86 dm * 2,4 kg/dm<sup>3</sup> 

<span style="color:red;">m = 31 756,7 kg</span>
